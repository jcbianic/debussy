name: IIKit Feature Workflow
description: Standard workflow for implementing a feature with Intent Integrity Kit

steps:
  - id: constitution
    name: Constitution
    description: Define project governance, coding standards, and non-negotiable principles
    command: /iikit-00-constitution

  - id: specify
    name: Specify
    description: Create feature specification with user stories and acceptance criteria
    command: /iikit-01-specify

  - id: plan
    name: Plan
    description: Generate technical design document with data models and API contracts
    command: /iikit-02-plan

  - id: checklist
    name: Checklist
    description: Validate requirements completeness, clarity, and consistency
    command: /iikit-03-checklist

  - id: testify
    name: Testify
    description: Generate Gherkin test specifications with assertion integrity hashes
    command: /iikit-04-testify

  - id: tasks
    name: Tasks
    description: Generate dependency-ordered implementation task breakdown
    command: /iikit-05-tasks

  - id: analyze
    name: Analyze
    description: Validate cross-artifact consistency and requirements traceability
    command: /iikit-06-analyze

  - id: implement
    name: Implement
    description: Execute implementation plan — write code, run tests, verify assertions
    command: /iikit-07-implement
