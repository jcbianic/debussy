<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategy Review</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  /* -- Header ------------------------------------------------ */
  .header {
    max-width: 1000px;
    margin: 0 auto 2rem;
    border-bottom: 1px solid #2d3748;
    padding-bottom: 1.5rem;
  }
  .header h1 { font-size: 1.5rem; font-weight: 700; color: #f7fafc; margin-bottom: 0.25rem; }
  .header .subtitle { color: #718096; font-size: 0.88rem; margin-bottom: 1rem; }

  .progress-bar-wrap {
    background: #2d3748; border-radius: 999px; height: 6px;
    overflow: hidden; margin-bottom: 0.75rem;
  }
  .progress-bar {
    height: 100%; background: linear-gradient(90deg, #667eea, #764ba2);
    border-radius: 999px; transition: width 0.3s ease;
  }

  .stats { display: flex; flex-wrap: wrap; gap: 1rem 1.5rem; font-size: 0.82rem; color: #718096; }
  .stats span { display: flex; align-items: center; gap: 0.35rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  /* -- Filter Tabs ------------------------------------------- */
  .filter-tabs {
    max-width: 1000px; margin: 0 auto 1.5rem;
    display: flex; flex-wrap: wrap; gap: 0.5rem;
  }
  .filter-tab {
    background: #1a1f2e; border: 1px solid #2d3748; border-radius: 6px;
    color: #a0aec0; font-size: 0.78rem; padding: 0.35rem 0.85rem;
    cursor: pointer; transition: all 0.15s;
  }
  .filter-tab:hover { background: #2d3748; color: #e2e8f0; }
  .filter-tab.active { background: #667eea; color: white; border-color: #667eea; }

  /* -- Card Grid --------------------------------------------- */
  .card-grid {
    max-width: 1000px; margin: 0 auto 2rem;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.75rem;
  }

  .artifact-card {
    background: #1a1f2e; border: 1px solid #2d3748; border-radius: 10px;
    padding: 1rem 1.25rem; cursor: pointer; transition: all 0.15s;
  }
  .artifact-card:hover { border-color: #667eea; transform: translateY(-1px); }
  .artifact-card.focused { border-color: #667eea; box-shadow: 0 0 0 1px #667eea; }

  .card-label { font-size: 0.95rem; font-weight: 600; color: #e2e8f0; margin-bottom: 0.4rem; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }

  .badge {
    font-size: 0.68rem; font-weight: 600; padding: 0.15rem 0.5rem;
    border-radius: 4px; letter-spacing: 0.03em; text-transform: uppercase;
  }
  .badge-type { background: #1a2433; color: #63b3ed; }
  .badge-draft { background: #3d3400; color: #f6e05e; }
  .badge-progress { background: #1a2433; color: #63b3ed; }
  .badge-reviewed { background: #1c3a2a; color: #68d391; }
  .badge-done { background: #2d3748; color: #a0aec0; }
  .badge-later { background: #2d2d3d; color: #a0aec0; }

  .artifact-card.unseen { border-left: 3px solid #667eea; }
  .artifact-card.skipped { opacity: 0.5; }

  /* -- Group Actions ----------------------------------------- */
  .group-header {
    max-width: 1000px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.5rem 0; margin-bottom: 0.25rem;
  }
  .group-title {
    font-size: 0.82rem; font-weight: 700; color: #667eea;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .group-later-btn {
    background: #1a1f2e; border: 1px solid #2d3748; border-radius: 6px;
    color: #718096; font-size: 0.72rem; padding: 0.25rem 0.65rem;
    cursor: pointer; transition: all 0.15s;
  }
  .group-later-btn:hover { background: #2d3748; color: #a0aec0; }

  .card-date { font-size: 0.72rem; color: #4a5568; margin-top: 0.35rem; }
  .card-group { font-size: 0.68rem; color: #667eea; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.3rem; }

  /* -- Detail View ------------------------------------------- */
  .detail-view { max-width: 900px; margin: 0 auto; display: none; }
  .detail-view.visible { display: block; }

  .back-btn {
    background: none; border: none; color: #667eea; font-size: 0.85rem;
    cursor: pointer; padding: 0.25rem 0; margin-bottom: 1rem;
  }
  .back-btn:hover { text-decoration: underline; }

  .detail-header {
    display: flex; align-items: center; gap: 0.75rem;
    margin-bottom: 1.5rem; padding-bottom: 1rem;
    border-bottom: 1px solid #2d3748;
  }
  .detail-title { font-size: 1.3rem; font-weight: 700; color: #f7fafc; }

  /* -- Section Blocks ---------------------------------------- */
  .section-block {
    background: #1a1f2e; border: 1px solid #2d3748; border-radius: 10px;
    padding: 1.25rem; margin-bottom: 0.75rem; transition: border-color 0.15s;
  }
  .section-block.focused { border-color: #667eea; }
  .section-block.approved { border-left: 3px solid #48bb78; }
  .section-block.flagged { border-left: 3px solid #fc8181; }
  .section-block.discuss { border-left: 3px solid #4299e1; }

  .section-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 1rem; margin-bottom: 0.75rem;
  }
  .section-name { font-size: 1rem; font-weight: 600; color: #e2e8f0; }

  .section-actions { display: flex; gap: 0.35rem; flex-shrink: 0; }
  .section-btn {
    border: none; border-radius: 6px; font-size: 0.75rem; font-weight: 600;
    cursor: pointer; padding: 0.3rem 0.7rem; transition: all 0.15s;
  }

  .btn-approve {
    background: #1c3a2a; color: #68d391; border: 1px solid #276749;
  }
  .btn-approve:hover { background: #276749; }
  .btn-approve.active { background: #48bb78; color: #1a202c; border-color: #48bb78; }

  .btn-flag {
    background: #3d1515; color: #fc8181; border: 1px solid #742a2a;
  }
  .btn-flag:hover { background: #742a2a; }
  .btn-flag.active { background: #fc8181; color: #1a202c; border-color: #fc8181; }

  .btn-discuss {
    background: #1a2433; color: #63b3ed; border: 1px solid #2a4365;
  }
  .btn-discuss:hover { background: #2a4365; }
  .btn-discuss.active { background: #4299e1; color: #1a202c; border-color: #4299e1; }

  .btn-done {
    background: #1a1f2e; color: #a0aec0; border: 1px solid #4a5568;
  }
  .btn-done:hover { background: #2d3748; }
  .btn-done.active { background: #718096; color: #1a202c; border-color: #718096; }

  .section-block.done { border-left: 3px solid #718096; }

  .section-content {
    font-size: 0.88rem; color: #a0aec0; line-height: 1.65;
  }
  .section-content h3 { font-size: 0.92rem; color: #e2e8f0; margin: 0.75rem 0 0.35rem; }
  .section-content p { margin-bottom: 0.5rem; }
  .section-content ul, .section-content ol { margin: 0.35rem 0 0.5rem 1.5rem; }
  .section-content li { margin-bottom: 0.25rem; }
  .section-content strong { color: #e2e8f0; }
  .section-content code {
    background: #0f1117; padding: 0.15rem 0.4rem; border-radius: 3px;
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.82rem;
  }
  .section-content table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; }
  .section-content th, .section-content td {
    padding: 0.4rem 0.6rem; border: 1px solid #2d3748; text-align: left;
    font-size: 0.82rem;
  }
  .section-content th { background: #0f1117; color: #718096; font-weight: 600; }
  .section-content a { color: #667eea; text-decoration: none; }
  .section-content a:hover { text-decoration: underline; }

  /* -- Prior Round Notes ------------------------------------- */
  .prior-round {
    margin-top: 0.5rem; margin-bottom: 0.5rem;
    background: #0f1117; border: 1px solid #2d3748; border-radius: 6px;
    padding: 0.5rem 0.75rem; font-size: 0.78rem;
  }
  .prior-round-header {
    display: flex; align-items: center; gap: 0.5rem; cursor: pointer;
    color: #718096; font-weight: 600; font-size: 0.72rem;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .prior-round-header:hover { color: #a0aec0; }
  .prior-round-body {
    margin-top: 0.4rem; color: #a0aec0; line-height: 1.5;
    white-space: pre-wrap;
  }
  .prior-round-status {
    font-size: 0.68rem; font-weight: 600; padding: 0.1rem 0.4rem;
    border-radius: 3px; text-transform: uppercase;
  }
  .prior-status-discuss { background: #1a2433; color: #63b3ed; }
  .prior-status-approved { background: #1c3a2a; color: #68d391; }
  .prior-status-flagged { background: #3d1515; color: #fc8181; }
  .prior-status-pending { background: #2d2d3d; color: #718096; }

  /* -- Discussion Area --------------------------------------- */
  .discuss-area { margin-top: 0.75rem; display: none; }
  .discuss-area.visible { display: block; }
  .discuss-area textarea {
    width: 100%; background: #0f1117; border: 1px solid #4a5568; border-radius: 6px;
    color: #e2e8f0; font-size: 0.82rem; padding: 0.5rem 0.75rem;
    resize: vertical; min-height: 60px; font-family: inherit; line-height: 1.5;
  }
  .discuss-area textarea:focus { outline: none; border-color: #667eea; }
  .discuss-area textarea::placeholder { color: #4a5568; }

  /* -- Submit Section ---------------------------------------- */
  .submit-section {
    max-width: 1000px; margin: 2rem auto 0;
    border-top: 1px solid #2d3748; padding-top: 1.5rem;
    display: none; flex-direction: column; gap: 0.75rem;
  }
  .submit-section.visible { display: flex; }
  .submit-row { display: flex; align-items: center; gap: 1rem; }
  .submit-summary {
    font-size: 0.82rem; color: #718096; line-height: 1.5;
  }
  .submit-btn {
    background: linear-gradient(135deg, #667eea, #764ba2); color: white;
    border: none; border-radius: 8px; padding: 0.65rem 1.5rem;
    font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    white-space: nowrap;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* -- Toast ------------------------------------------------- */
  .toast {
    position: fixed; bottom: 2rem; right: 2rem;
    background: #1a1f2e; border: 1px solid #2d3748; border-radius: 8px;
    padding: 0.75rem 1.25rem; font-size: 0.85rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transform: translateY(100px); opacity: 0; transition: all 0.3s ease;
    z-index: 1000;
  }
  .toast.visible { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: #48bb78; color: #68d391; }
  .toast.error { border-color: #fc8181; color: #fc8181; }
  .toast.info { border-color: #667eea; color: #a0aec0; }

  /* -- Keyboard hint ----------------------------------------- */
  .kbd-hint {
    position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
    background: #1a1f2e; border: 1px solid #2d3748; border-radius: 6px;
    padding: 0.4rem 0.8rem; font-size: 0.72rem; color: #4a5568;
  }
  kbd {
    background: #2d3748; border: 1px solid #4a5568; border-radius: 3px;
    padding: 0.1rem 0.35rem; font-family: inherit; font-size: 0.7rem;
    color: #a0aec0;
  }

  /* -- Dashboard View Container ------------------------------ */
  .dashboard-view { max-width: 1000px; margin: 0 auto; }
</style>
</head>
<body>

<div class="header">
  <h1 id="pageTitle">Strategy Review</h1>
  <p class="subtitle" id="pageSubtitle">Review strategy artifacts section by section</p>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="stats" id="statsBar"></div>
</div>

<div class="dashboard-view" id="dashboardView">
  <div class="filter-tabs" id="filterTabs"></div>
  <div class="card-grid" id="cardGrid"></div>
</div>

<div class="detail-view" id="detailView">
  <button class="back-btn" id="backBtn" onclick="showDashboard()">&larr; Back to Dashboard</button>
  <div class="detail-header" id="detailHeader"></div>
  <div id="sectionList"></div>
</div>

<div class="submit-section" id="submitSection">
  <div class="submit-summary" id="submitSummary"></div>
  <div class="submit-row">
    <button class="submit-btn" id="submitBtn" onclick="submitReview()">Submit Review</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="kbd-hint" id="kbdHint">
  <kbd>j</kbd>/<kbd>k</kbd> navigate &nbsp;
  <kbd>Enter</kbd> open &nbsp;
  <kbd>Esc</kbd> back &nbsp;
  <kbd>r</kbd> done &nbsp;
  <kbd>a</kbd> approve &nbsp;
  <kbd>f</kbd> flag &nbsp;
  <kbd>d</kbd> discuss
</div>

<script>
// -- Data ----------------------------------------------------
const REQUEST = __REQUEST_JSON__;

// -- State ---------------------------------------------------
let currentView = 'dashboard'; // 'dashboard' | 'detail'
let currentArtifact = null;
let activeFilter = 'all';
let cardFocusIndex = 0;
let sectionFocusIndex = 0;

// reviews[slug] = { sections: { "section-id": { status, notes } } }
const reviews = {};
let artifactContents = {}; // slug -> raw markdown (after frontmatter strip)
let artifactSections = {}; // slug -> [{id, name, content}]

const autoSaveTimers = {};  // per-slug debounce timers
const dirtyArtifacts = {};  // slugs with unsaved changes

// Prior rounds: { roundId: { slug: { sections: { sectionId: { status, notes } } } } }
let priorRounds = {};

// Track which artifacts the user has opened (persists via sessionStorage)
const seenArtifacts = new Set(JSON.parse(sessionStorage.getItem('seenArtifacts') || '[]'));
function markSeen(slug) {
  seenArtifacts.add(slug);
  sessionStorage.setItem('seenArtifacts', JSON.stringify([...seenArtifacts]));
}

// -- Init ----------------------------------------------------
document.getElementById('pageTitle').textContent = REQUEST.title || 'Strategy Review';

const artifacts = REQUEST.artifacts || [];

// Load existing reviews from server
async function loadExistingReviews() {
  try {
    const resp = await fetch('/api/reviews');
    if (resp.ok) {
      const data = await resp.json();
      Object.assign(reviews, data);
    }
  } catch (e) { /* ignore */ }
}

async function loadPriorRounds() {
  try {
    const resp = await fetch('/api/rounds');
    if (resp.ok) {
      priorRounds = await resp.json();
    }
  } catch (e) { /* ignore */ }
}

function getPriorNotes(slug, sectionId) {
  // Returns array of { round, status, notes } from prior rounds
  const results = [];
  for (const [roundId, roundData] of Object.entries(priorRounds)) {
    const artifactReview = roundData[slug];
    if (artifactReview && artifactReview.sections && artifactReview.sections[sectionId]) {
      const sr = artifactReview.sections[sectionId];
      if (sr.notes || (sr.status && sr.status !== 'pending')) {
        results.push({ round: roundId, status: sr.status || 'pending', notes: sr.notes || '' });
      }
    }
  }
  return results;
}

async function init() {
  await loadExistingReviews();
  await loadPriorRounds();
  buildFilterTabs();
  await loadAllArtifacts();
  renderDashboard();
  updateStats();
}

// -- Filter Tabs ---------------------------------------------
function buildFilterTabs() {
  const types = new Set(['all']);
  artifacts.forEach(a => types.add(a.type));

  const container = document.getElementById('filterTabs');
  const typeLabels = {
    all: 'All', vision: 'Vision', problems: 'Problems', audiences: 'Audiences',
    landscape: 'Landscape', competitor: 'Competitors', ally: 'Allies',
    'feature-space': 'Feature Space', product: 'Product'
  };

  types.forEach(type => {
    const btn = document.createElement('button');
    btn.className = `filter-tab${type === 'all' ? ' active' : ''}`;
    btn.textContent = typeLabels[type] || type;
    btn.onclick = () => setFilter(type);
    container.appendChild(btn);
  });
}

function setFilter(type) {
  activeFilter = type;
  document.querySelectorAll('.filter-tab').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === (
      {all: 'All', vision: 'Vision', problems: 'Problems', audiences: 'Audiences',
       landscape: 'Landscape', competitor: 'Competitors', ally: 'Allies',
       'feature-space': 'Feature Space', product: 'Product'}[type] || type
    ));
  });
  cardFocusIndex = 0;
  renderDashboard();
}

// -- Load Artifacts ------------------------------------------
async function loadAllArtifacts() {
  const promises = artifacts.map(async (a) => {
    try {
      const resp = await fetch(`/api/artifact/${a.path}`);
      if (resp.ok) {
        const text = await resp.text();
        artifactContents[a.slug] = text;
        artifactSections[a.slug] = parseSections(text);
      }
    } catch (e) { /* ignore */ }
  });
  await Promise.all(promises);
}

function parseSections(markdown) {
  const sections = [];
  const lines = markdown.split('\n');
  let current = null;
  let contentLines = [];

  function flush() {
    if (current) {
      current.content = contentLines.join('\n').trim();
      sections.push(current);
    }
  }

  for (const line of lines) {
    const h2Match = line.match(/^## (.+)$/);
    if (h2Match) {
      flush();
      const name = h2Match[1].trim();
      const id = slugify(name);
      current = { id, name, content: '' };
      contentLines = [];
    } else if (current) {
      contentLines.push(line);
    } else {
      // Content before any ## heading -- treat as intro
      if (line.trim() && !line.startsWith('#')) {
        if (!current) {
          current = { id: 'introduction', name: 'Introduction', content: '' };
          contentLines = [];
        }
        contentLines.push(line);
      }
    }
  }
  flush();
  return sections;
}

function slugify(text) {
  return text.toLowerCase()
    .replace(/[^a-z0-9\s-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .trim();
}

// -- Dashboard Rendering -------------------------------------
function renderDashboard() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';

  const filtered = activeFilter === 'all'
    ? artifacts
    : artifacts.filter(a => a.type === activeFilter);

  // Group artifacts: ungrouped first, then by group name
  const groups = new Map(); // groupKey -> { label, type, items[] }
  filtered.forEach(a => {
    const key = a.group || a.type;
    if (!groups.has(key)) groups.set(key, { label: a.group || '', type: a.type, items: [] });
    groups.get(key).items.push(a);
  });

  let flatIndex = 0;
  groups.forEach((group, key) => {
    // Show group header with "Review Later" for multi-item groups
    if (group.label && group.items.length > 1) {
      const isAllLater = group.items.every(a => isGroupSkipped(a.slug));
      const hdr = document.createElement('div');
      hdr.className = 'group-header';
      hdr.innerHTML = `
        <span class="group-title">${esc(group.label)}</span>
        <button class="group-later-btn" onclick="toggleGroupLater('${esc(group.type)}')">${isAllLater ? 'Undo Skip' : 'Review Later'}</button>
      `;
      grid.appendChild(hdr);
    }

    group.items.forEach(a => {
      const card = document.createElement('div');
      const isFocused = flatIndex === cardFocusIndex;
      const seen = seenArtifacts.has(a.slug);
      const skipped = isGroupSkipped(a.slug);
      card.className = `artifact-card${isFocused ? ' focused' : ''}${!seen && !skipped ? ' unseen' : ''}${skipped ? ' skipped' : ''}`;
      card.onclick = () => openArtifact(a.slug);

      const { status: reviewStatus, reviewed, total, allDone } = getArtifactReviewStatus(a.slug);
      const badgeClass = skipped ? 'badge-later'
        : allDone ? 'badge-done'
        : reviewStatus === 'reviewed' ? 'badge-reviewed'
        : reviewStatus === 'in progress' ? 'badge-progress'
        : 'badge-draft';
      const badgeText = skipped ? 'later' : total > 0 ? `${reviewed}/${total}` : reviewStatus;

      card.innerHTML = `
        <div class="card-label">${esc(a.label)}</div>
        <div class="card-meta">
          <span class="badge badge-type">${esc(a.type)}</span>
          <span class="badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="card-date">${esc(a.updated || '')}</div>
      `;

      grid.appendChild(card);
      flatIndex++;
    });
  });

}

function isGroupSkipped(slug) {
  const r = reviews[slug];
  if (!r || !r.sections) return false;
  const sections = artifactSections[slug] || [];
  return sections.length > 0 && sections.every(s => r.sections[s.id] && r.sections[s.id].status === 'later');
}

function toggleGroupLater(type) {
  const groupArtifacts = artifacts.filter(a => a.type === type);
  const allSkipped = groupArtifacts.every(a => isGroupSkipped(a.slug));

  groupArtifacts.forEach(a => {
    const sections = artifactSections[a.slug] || [];
    if (!reviews[a.slug]) reviews[a.slug] = { sections: {} };
    sections.forEach(s => {
      if (allSkipped) {
        // Undo: reset to pending (but keep notes)
        const current = reviews[a.slug].sections[s.id] || {};
        if (current.status === 'later') {
          reviews[a.slug].sections[s.id] = { ...current, status: 'pending' };
        }
      } else {
        // Skip: set all pending sections to later
        const current = reviews[a.slug].sections[s.id] || {};
        if (!current.status || current.status === 'pending') {
          reviews[a.slug].sections[s.id] = { ...current, status: 'later' };
        }
      }
    });
    scheduleAutoSave(a.slug);
  });

  renderDashboard();
  updateStats();
}

function isReviewed(status) {
  return status === 'approved' || status === 'flagged' || status === 'discuss' || status === 'later' || status === 'done';
}

function getArtifactReviewStatus(slug) {
  const r = reviews[slug];
  const sections = artifactSections[slug] || [];
  const total = sections.length;
  if (!r || !r.sections || total === 0) return { status: 'draft', reviewed: 0, total, allDone: false };
  const reviewed = sections.filter(s => r.sections[s.id] && isReviewed(r.sections[s.id].status)).length;
  const allDone = reviewed === total && sections.every(s => {
    const st = r.sections[s.id] && r.sections[s.id].status;
    return st === 'done' || st === 'later';
  });
  const status = reviewed === 0 ? 'draft' : reviewed === total ? 'reviewed' : 'in progress';
  return { status, reviewed, total, allDone };
}

// -- Detail View ---------------------------------------------
async function openArtifact(slug) {
  markSeen(slug);
  currentArtifact = slug;
  currentView = 'detail';
  sectionFocusIndex = 0;

  const a = artifacts.find(x => x.slug === slug);
  if (!a) return;

  const header = document.getElementById('detailHeader');
  header.innerHTML = `
    <span class="detail-title">${esc(a.label)}</span>
    <span class="badge badge-type">${esc(a.type)}</span>
    <span class="badge ${a.status === 'reviewed' ? 'badge-reviewed' : 'badge-draft'}">${esc(a.status)}</span>
  `;

  renderSections(slug);

  document.getElementById('dashboardView').style.display = 'none';
  document.getElementById('detailView').classList.add('visible');
  updateStats();
  window.scrollTo({ top: 0 });
}

function renderSections(slug) {
  const container = document.getElementById('sectionList');
  container.innerHTML = '';

  const sections = artifactSections[slug] || [];
  const review = reviews[slug] || { sections: {} };

  sections.forEach((section, idx) => {
    const sr = review.sections[section.id] || {};
    const status = sr.status || 'pending';
    const notes = sr.notes || '';

    const block = document.createElement('div');
    block.className = `section-block${idx === sectionFocusIndex ? ' focused' : ''}`;
    if (status === 'approved') block.classList.add('approved');
    if (status === 'flagged') block.classList.add('flagged');
    if (status === 'discuss') block.classList.add('discuss');
    if (status === 'done') block.classList.add('done');
    block.id = `section-${section.id}`;

    // Build prior round notes HTML
    const priorNotesList = getPriorNotes(slug, section.id);
    let priorHtml = '';
    if (priorNotesList.length > 0) {
      priorHtml = priorNotesList.map(p => {
        const statusClass = `prior-status-${p.status}`;
        return `<div class="prior-round">
          <div class="prior-round-header">
            <span>Round ${esc(p.round)}</span>
            <span class="prior-round-status ${statusClass}">${esc(p.status)}</span>
          </div>
          ${p.notes ? `<div class="prior-round-body">${esc(p.notes)}</div>` : ''}
        </div>`;
      }).join('');
    }

    block.innerHTML = `
      <div class="section-header">
        <span class="section-name">${esc(section.name)}</span>
        <div class="section-actions">
          <button class="section-btn btn-done${status === 'done' ? ' active' : ''}"
                  onclick="setSectionStatus('${slug}','${section.id}','done')">Done</button>
          <button class="section-btn btn-approve${status === 'approved' ? ' active' : ''}"
                  onclick="setSectionStatus('${slug}','${section.id}','approved')">Approve</button>
          <button class="section-btn btn-flag${status === 'flagged' ? ' active' : ''}"
                  onclick="setSectionStatus('${slug}','${section.id}','flagged')">Flag</button>
          <button class="section-btn btn-discuss${status === 'discuss' ? ' active' : ''}"
                  onclick="toggleDiscuss('${slug}','${section.id}')">Discuss</button>
        </div>
      </div>
      ${priorHtml}
      <div class="section-content">${renderMarkdown(section.content)}</div>
      <div class="discuss-area${notes || status === 'discuss' ? ' visible' : ''}" id="discuss-${section.id}">
        <textarea placeholder="Add notes or discussion..."
                  oninput="saveNotes('${slug}','${section.id}',this.value)">${esc(notes)}</textarea>
      </div>
    `;

    container.appendChild(block);
  });
}

// -- Section Actions -----------------------------------------
function setSectionStatus(slug, sectionId, status) {
  if (!reviews[slug]) reviews[slug] = { sections: {} };
  const current = reviews[slug].sections[sectionId];
  if (current && current.status === status) {
    // Toggle off
    reviews[slug].sections[sectionId] = { ...current, status: 'pending' };
  } else {
    reviews[slug].sections[sectionId] = {
      ...(current || {}),
      status: status,
    };
  }
  renderSections(slug);
  updateStats();
  scheduleAutoSave(slug);
}

function toggleDiscuss(slug, sectionId) {
  if (!reviews[slug]) reviews[slug] = { sections: {} };
  const current = reviews[slug].sections[sectionId] || {};
  const area = document.getElementById(`discuss-${sectionId}`);

  if (current.status === 'discuss') {
    // Toggle off — clear status only if notes are empty
    if (!current.notes) {
      reviews[slug].sections[sectionId] = { ...current, status: 'pending' };
    }
    if (area) area.classList.remove('visible');
  } else {
    reviews[slug].sections[sectionId] = { ...current, status: 'discuss' };
    if (area) {
      area.classList.add('visible');
      area.querySelector('textarea').focus();
    }
  }
  renderSections(slug);
  updateStats();
  scheduleAutoSave(slug);
}

function saveNotes(slug, sectionId, value) {
  if (!reviews[slug]) reviews[slug] = { sections: {} };
  if (!reviews[slug].sections[sectionId]) {
    reviews[slug].sections[sectionId] = { status: 'discuss' };
  }
  reviews[slug].sections[sectionId].notes = value;
  // If notes are being typed and status is still pending, promote to discuss
  if (value && reviews[slug].sections[sectionId].status === 'pending') {
    reviews[slug].sections[sectionId].status = 'discuss';
  }
  scheduleAutoSave(slug);
}

// -- Auto-Save -----------------------------------------------
function scheduleAutoSave(slug) {
  dirtyArtifacts[slug] = true;
  clearTimeout(autoSaveTimers[slug]);
  autoSaveTimers[slug] = setTimeout(() => flushSave(slug), 500);
}

async function flushSave(slug) {
  if (!reviews[slug]) return;
  delete dirtyArtifacts[slug];
  try {
    const resp = await fetch(`/api/review/${slug}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(reviews[slug]),
    });
    if (!resp.ok) throw new Error('save failed');
  } catch (e) {
    dirtyArtifacts[slug] = true;  // mark dirty again on failure
    showToast('Save failed — will retry', 'error');
  }
}

function flushAllPending() {
  Object.keys(dirtyArtifacts).forEach(slug => {
    clearTimeout(autoSaveTimers[slug]);
    // Use sendBeacon for reliability during page unload
    const data = JSON.stringify(reviews[slug]);
    navigator.sendBeacon(`/api/review/${slug}`, new Blob([data], { type: 'application/json' }));
    delete dirtyArtifacts[slug];
  });
}

window.addEventListener('beforeunload', flushAllPending);
window.addEventListener('pagehide', flushAllPending);

// -- Stats ---------------------------------------------------
function updateStats() {
  let totalSections = 0;
  let approvedCount = 0;
  let flaggedCount = 0;
  let discussCount = 0;
  let doneCount = 0;
  let laterCount = 0;
  let pendingCount = 0;

  artifacts.forEach(a => {
    const sections = artifactSections[a.slug] || [];
    const review = reviews[a.slug] || { sections: {} };
    sections.forEach(s => {
      totalSections++;
      const sr = review.sections[s.id];
      if (sr && sr.status === 'approved') approvedCount++;
      else if (sr && sr.status === 'flagged') flaggedCount++;
      else if (sr && sr.status === 'discuss') discussCount++;
      else if (sr && sr.status === 'done') doneCount++;
      else if (sr && sr.status === 'later') laterCount++;
      else pendingCount++;
    });
  });

  const seenCount = seenArtifacts.size;
  const totalArtifacts = artifacts.length;

  const bar = document.getElementById('statsBar');
  bar.innerHTML = `
    <span><span class="dot" style="background:#718096"></span>${doneCount} done</span>
    <span><span class="dot" style="background:#48bb78"></span>${approvedCount} approved</span>
    <span><span class="dot" style="background:#fc8181"></span>${flaggedCount} flagged</span>
    <span><span class="dot" style="background:#4299e1"></span>${discussCount} discuss</span>
    ${laterCount > 0 ? `<span><span class="dot" style="background:#4a5568"></span>${laterCount} later</span>` : ''}
    <span><span class="dot" style="background:#4a5568"></span>${pendingCount} pending</span>
    <span>${seenCount}/${totalArtifacts} seen</span>
  `;

  const reviewedCount = doneCount + approvedCount + flaggedCount + discussCount + laterCount;
  const pct = totalSections > 0 ? (reviewedCount / totalSections) * 100 : 0;
  document.getElementById('progressBar').style.width = `${pct}%`;

  // Show submit section when no pending sections remain, or always in detail view
  const allHandled = pendingCount === 0 && totalSections > 0;
  const submitEl = document.getElementById('submitSection');
  const summaryEl = document.getElementById('submitSummary');
  const submitBtn = document.getElementById('submitBtn');

  if (allHandled || currentView === 'detail') {
    submitEl.classList.add('visible');
    if (allHandled) {
      const parts = [];
      if (doneCount) parts.push(`${doneCount} done`);
      if (approvedCount) parts.push(`${approvedCount} approved`);
      if (flaggedCount) parts.push(`${flaggedCount} flagged`);
      if (discussCount) parts.push(`${discussCount} with notes`);
      if (laterCount) parts.push(`${laterCount} deferred`);
      summaryEl.textContent = `All sections handled: ${parts.join(', ')}. Submit to send your review back to Claude.`;
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit Review';
    } else {
      summaryEl.textContent = '';
    }
  } else {
    submitEl.classList.remove('visible');
  }
}

// -- Navigation ----------------------------------------------
function showDashboard() {
  currentView = 'dashboard';
  currentArtifact = null;
  document.getElementById('detailView').classList.remove('visible');
  document.getElementById('dashboardView').style.display = 'block';
  renderDashboard();
  updateStats();
}

// -- Submit --------------------------------------------------
async function submitReview() {
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  let totalSections = 0;
  let approvedCount = 0;
  let flaggedCount = 0;
  let discussCount = 0;
  let doneCount = 0;
  let laterCount = 0;
  let pendingCount = 0;

  artifacts.forEach(a => {
    const sections = artifactSections[a.slug] || [];
    const review = reviews[a.slug] || { sections: {} };
    sections.forEach(s => {
      totalSections++;
      const sr = review.sections[s.id];
      if (sr && sr.status === 'approved') approvedCount++;
      else if (sr && sr.status === 'flagged') flaggedCount++;
      else if (sr && sr.status === 'discuss') discussCount++;
      else if (sr && sr.status === 'done') doneCount++;
      else if (sr && sr.status === 'later') laterCount++;
      else pendingCount++;
    });
  });

  const payload = {
    reviews: reviews,
    summary: {
      total_sections: totalSections,
      approved: approvedCount,
      flagged: flaggedCount,
      discuss: discussCount,
      done: doneCount,
      later: laterCount,
      pending: pendingCount,
    },
  };

  try {
    const resp = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (resp.ok) {
      showDashboard();
      showToast('Review submitted! You can close this tab.', 'success', 5000);
    } else {
      throw new Error(`Server responded ${resp.status}`);
    }
  } catch (err) {
    showToast(`Failed to submit: ${err.message}`, 'error');
    btn.disabled = false;
    btn.textContent = 'Submit Review';
  }
}

// -- Markdown Renderer (inline, no deps) ---------------------
function renderMarkdown(text) {
  if (!text) return '';

  let html = esc(text);

  // Tables
  html = html.replace(/^(\|.+\|)\n(\|[\s:|-]+\|)\n((?:\|.+\|\n?)+)/gm, (match, header, sep, bodyBlock) => {
    const headers = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    const rows = bodyBlock.trim().split('\n').map(row => {
      const cells = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
  });

  // Headers (h3 only -- h2 is section boundary)
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');

  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

  // Paragraphs
  html = html.replace(/\n\n/g, '</p><p>');
  html = `<p>${html}</p>`;

  // Clean up empty paragraphs
  html = html.replace(/<p>\s*<\/p>/g, '');
  html = html.replace(/<p>\s*(<(?:h3|ul|table|ol))/g, '$1');
  html = html.replace(/(<\/(?:h3|ul|table|ol)>)\s*<\/p>/g, '$1');

  return html;
}

// -- Keyboard Navigation -------------------------------------
document.addEventListener('keydown', (e) => {
  // Ignore if typing in textarea
  if (e.target.tagName === 'TEXTAREA') return;

  if (currentView === 'dashboard') {
    const filtered = activeFilter === 'all'
      ? artifacts
      : artifacts.filter(a => a.type === activeFilter);

    if (e.key === 'j' || e.key === 'ArrowDown') {
      e.preventDefault();
      cardFocusIndex = Math.min(cardFocusIndex + 1, filtered.length - 1);
      renderDashboard();
      scrollToFocusedCard();
    } else if (e.key === 'k' || e.key === 'ArrowUp') {
      e.preventDefault();
      cardFocusIndex = Math.max(cardFocusIndex - 1, 0);
      renderDashboard();
      scrollToFocusedCard();
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (filtered[cardFocusIndex]) {
        openArtifact(filtered[cardFocusIndex].slug);
      }
    }
  } else if (currentView === 'detail' && currentArtifact) {
    const sections = artifactSections[currentArtifact] || [];

    if (e.key === 'Escape') {
      e.preventDefault();
      showDashboard();
    } else if (e.key === 'j' || e.key === 'ArrowDown') {
      e.preventDefault();
      sectionFocusIndex = Math.min(sectionFocusIndex + 1, sections.length - 1);
      renderSections(currentArtifact);
      scrollToFocusedSection();
    } else if (e.key === 'k' || e.key === 'ArrowUp') {
      e.preventDefault();
      sectionFocusIndex = Math.max(sectionFocusIndex - 1, 0);
      renderSections(currentArtifact);
      scrollToFocusedSection();
    } else if (e.key === 'a') {
      e.preventDefault();
      if (sections[sectionFocusIndex]) {
        setSectionStatus(currentArtifact, sections[sectionFocusIndex].id, 'approved');
      }
    } else if (e.key === 'f') {
      e.preventDefault();
      if (sections[sectionFocusIndex]) {
        setSectionStatus(currentArtifact, sections[sectionFocusIndex].id, 'flagged');
      }
    } else if (e.key === 'r') {
      e.preventDefault();
      if (sections[sectionFocusIndex]) {
        setSectionStatus(currentArtifact, sections[sectionFocusIndex].id, 'done');
      }
    } else if (e.key === 'd') {
      e.preventDefault();
      if (sections[sectionFocusIndex]) {
        toggleDiscuss(currentArtifact, sections[sectionFocusIndex].id);
      }
    }
  }
});

function scrollToFocusedCard() {
  const card = document.querySelector('.artifact-card.focused');
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function scrollToFocusedSection() {
  const block = document.querySelector('.section-block.focused');
  if (block) block.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// -- Toast ---------------------------------------------------
function showToast(message, type, duration) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = `toast ${type} visible`;
  const ms = duration || (type === 'info' ? 1200 : 3500);
  setTimeout(() => { toast.classList.remove('visible'); }, ms);
}

// -- Util ----------------------------------------------------
function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// -- Boot ----------------------------------------------------
init();
</script>
