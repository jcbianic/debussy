<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #1a1a2e;
      background: #f5f5fa;
      min-height: 100vh;
    }

    /* ── Header ── */
    .hdr {
      background: #1a1a2e;
      color: white;
      padding: 0.875rem 1.75rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      height: 56px;
    }
    .hdr-info { flex: 1; min-width: 0; }
    .hdr h1 { font-size: 1.05rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hdr .run-id { font-size: 0.75rem; opacity: 0.5; font-family: monospace; }

    .chip {
      font-size: 0.68rem; font-weight: 700; padding: 3px 10px;
      border-radius: 12px; text-transform: uppercase; letter-spacing: 0.05em;
      white-space: nowrap; flex-shrink: 0;
    }
    .chip-done   { background: #22c55e; color: white; }
    .chip-active { background: #3b82f6; color: white; }

    /* ── Pipeline ── */
    .pipe-rail {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 0.75rem 1.5rem;
      overflow-x: auto;
      position: sticky;
      top: 56px;
      z-index: 40;
    }
    .pipe { display: flex; align-items: center; min-width: max-content; }

    .ps {
      display: flex; align-items: center; gap: 0.45rem;
      padding: 0.45rem 0.75rem; border-radius: 8px;
      cursor: pointer; transition: background 0.15s; flex-shrink: 0;
    }
    .ps:hover { background: #f3f4f6; }
    .ps.active { background: #eff6ff; box-shadow: inset 0 0 0 1.5px #3b82f6; }
    .ps.needs-review {
      background: #fef9ec; box-shadow: inset 0 0 0 1.5px #f59e0b;
      animation: pglow 2s ease-in-out infinite;
    }
    @keyframes pglow {
      0%,100% { box-shadow: inset 0 0 0 1.5px #f59e0b; }
      50% { box-shadow: inset 0 0 0 2px #f59e0b, 0 0 8px rgba(245,158,11,.3); }
    }

    .ps-ic {
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; flex-shrink: 0;
    }
    .ic-approved,.ic-completed      { background:#dcfce7;color:#166534 }
    .ic-pending_review              { background:#fef3c7;color:#92400e }
    .ic-running                     { background:#dbeafe;color:#1e40af }
    .ic-failed,.ic-rejected         { background:#fecaca;color:#991b1b }
    .ic-revision_requested          { background:#ffedd5;color:#9a3412 }
    .ic-not_started,.ic-skipped     { background:#f3f4f6;color:#9ca3af }

    .ps-name {
      font-size: 0.82rem; font-weight: 500; color: #374151;
      max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .ps.active .ps-name       { color: #1d4ed8; font-weight: 600; }
    .ps.needs-review .ps-name { color: #92400e; font-weight: 600; }

    .p-arr { width: 20px; height: 2px; background: #d1d5db; flex-shrink: 0; }

    /* ── Detail ── */
    .dw { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1.5rem 5rem; }

    .sdh {
      display: flex; align-items: flex-start; gap: 0.75rem;
      margin-bottom: 1.25rem; flex-wrap: wrap;
    }
    .sdh-main  { flex: 1; }
    .sdh-name  { font-size: 1.05rem; font-weight: 700; color: #111827; }
    .sdh-meta  { font-size: 0.78rem; color: #9ca3af; margin-top: 2px; }

    .sbadge {
      font-size: 0.68rem; font-weight: 700; padding: 3px 10px; border-radius: 10px;
      text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; flex-shrink: 0;
      margin-top: 3px;
    }
    .sb-approved,.sb-completed      { background:#dcfce7;color:#166534 }
    .sb-pending_review              { background:#fef3c7;color:#92400e }
    .sb-not_started                 { background:#f3f4f6;color:#6b7280 }
    .sb-rejected                    { background:#fecaca;color:#991b1b }
    .sb-revision_requested          { background:#ffedd5;color:#9a3412 }
    .sb-running                     { background:#dbeafe;color:#1e40af }
    .sb-failed                      { background:#fecaca;color:#991b1b }
    .sb-skipped                     { background:#f3f4f6;color:#9ca3af }

    /* ── Pending review notice ── */
    .pending-notice {
      background: #fef9ec; border: 1px solid #f59e0b; border-radius: 10px;
      padding: 1rem 1.25rem; margin-top: 1rem;
      display: flex; align-items: flex-start; gap: 0.75rem;
    }
    .pending-notice .pn-icon { font-size: 1.25rem; flex-shrink: 0; }
    .pending-notice .pn-body { flex: 1; }
    .pending-notice .pn-title { font-weight: 700; color: #92400e; font-size: 0.9rem; margin-bottom: 0.2rem; }
    .pending-notice .pn-desc  { font-size: 0.82rem; color: #78350f; }

    /* ── Artifact block ── */
    .ab {
      background: white; border: 1px solid #e5e7eb;
      border-radius: 10px; margin-bottom: 1rem; overflow: hidden;
    }
    .ab-hdr {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1rem; border-bottom: 1px solid #f3f4f6;
      flex-wrap: wrap;
    }
    .ab-name { font-family: monospace; font-size: 0.875rem; font-weight: 600; color: #374151; }
    .ab-desc { font-size: 0.78rem; color: #9ca3af; flex: 1; }
    .ab-tabs { display: flex; gap: 0.25rem; flex-shrink: 0; }
    .abt {
      background: none; border: 1px solid #d1d5db; border-radius: 4px;
      padding: 3px 10px; font-size: 0.75rem; color: #4b5563; cursor: pointer;
      transition: background 0.12s;
    }
    .abt:hover { background: #f3f4f6; }
    .abt.on { background: #1a1a2e; color: white; border-color: #1a1a2e; }

    .ab-body { padding: 1rem; }

    /* Summary */
    .sum-view { font-size: 0.875rem; line-height: 1.7; }
    .sum-view h3,.sum-view h4 { margin: 0.6rem 0 0.2rem; font-size: 0.9rem; }
    .sum-view ul,.sum-view ol { padding-left: 1.4rem; margin: 0.25rem 0; }
    .sum-view li { margin: 0.15rem 0; }
    .sum-view p  { margin: 0.3rem 0; }
    .sum-view strong { font-weight: 700; }
    .sum-view code { background:rgba(0,0,0,.06);padding:1px 5px;border-radius:3px;font-size:.82em;font-family:monospace }
    .sum-view pre  { background:rgba(0,0,0,.05);padding:.6rem;border-radius:4px;overflow-x:auto;margin:.4rem 0 }
    .sum-view pre code { background:none;padding:0 }

    /* Full */
    .full-view {
      background: #f8f9fa; border-radius: 6px; padding: 0.875rem;
      max-height: 480px; overflow-y: auto;
      white-space: pre-wrap; font-family: 'SF Mono','Fira Code',Menlo,monospace;
      font-size: 0.8rem; line-height: 1.55; color: #374151;
    }

    /* ── Cards (read-only display) ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 0.875rem;
    }
    .card {
      border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden;
    }
    .c-hdr {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0.875rem; background: #f9fafb;
      border-bottom: 1px solid #f3f4f6;
    }
    .c-type {
      font-size: 0.66rem; font-weight: 700; padding: 2px 7px;
      border-radius: 8px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .ct-finding        { background:#e0e7ff;color:#3730a3 }
    .ct-decision       { background:#f3e8ff;color:#6b21a8 }
    .ct-risk           { background:#fef3c7;color:#92400e }
    .ct-recommendation { background:#dcfce7;color:#166534 }
    .ct-change         { background:#dbeafe;color:#1e40af }

    .c-sev       { width:7px;height:7px;border-radius:50%;flex-shrink:0 }
    .sev-critical{ background:#ef4444 }
    .sev-high    { background:#f97316 }
    .sev-medium  { background:#f59e0b }
    .sev-low     { background:#22c55e }
    .sev-info    { background:#3b82f6 }
    .c-sev-label { font-size:0.7rem;color:#6b7280 }

    .c-body { padding: 0.7rem 0.875rem; }
    .c-title    { font-size: 0.88rem; font-weight: 600; color: #111827; margin-bottom: 0.3rem; }
    .c-abstract { font-size: 0.82rem; color: #4b5563; line-height: 1.55; }

    /* ── Review history ── */
    .rv-hist {
      background: #f9fafb; border-radius: 6px;
      padding: 0.6rem 0.875rem; font-size: 0.85rem; color: #4b5563;
      margin-top: 0.875rem;
    }
    .rv-hist strong { color: #1f2937; }

    .hr-section { margin-bottom: 1rem; }
    .hr-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #9ca3af; margin-bottom: 0.5rem; }
    .hr-entry { border-left: 3px solid #d1d5db; padding: 0.55rem 0.875rem; margin-bottom: 0.5rem; border-radius: 0 6px 6px 0; background: #f9fafb; }
    .hr-revision { border-left-color: #f59e0b; background: #fffbeb; }
    .hr-rejected { border-left-color: #ef4444; background: #fff1f2; }
    .hr-hdr { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.35rem; flex-wrap: wrap; }
    .hr-iter { font-size: 0.78rem; font-weight: 700; color: #374151; }
    .hr-dec { font-size: 0.68rem; font-weight: 700; padding: 1px 7px; border-radius: 8px; text-transform: uppercase; letter-spacing: 0.04em; }
    .hrd-revision_requested { background:#fef3c7;color:#92400e }
    .hrd-rejected           { background:#fecaca;color:#991b1b }
    .hr-time { font-size: 0.72rem; color: #9ca3af; margin-left: auto; }
    .hr-text { font-size: 0.82rem; color: #4b5563; white-space: pre-wrap; }

    /* Empty */
    .empty { text-align: center; padding: 2.5rem 1rem; color: #9ca3af; font-size: 0.9rem; }

    /* Toast */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      padding: 0.75rem 1.25rem; border-radius: 8px;
      color: white; font-weight: 600; font-size: 0.875rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.18);
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; z-index: 100; max-width: 340px;
    }
    .toast.on  { opacity: 1; transform: none; }
    .toast-ok  { background: #22c55e; }
    .toast-err { background: #ef4444; }
    .toast-info{ background: #3b82f6; }
  </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-info">
    <h1 id="wf-name">Workflow Dashboard</h1>
    <div class="run-id" id="wf-run-id"></div>
  </div>
  <span id="wf-chip" class="chip" style="display:none"></span>
</div>

<div class="pipe-rail">
  <div class="pipe" id="pipeline"></div>
</div>

<div class="dw">
  <div id="detail"></div>
</div>

<div id="toast" class="toast"></div>

<script>
  let STATE = __STATE_JSON__;

  let STEP_IDS = Object.keys(STATE.steps);
  let SELECTED = null;

  // { "stepId::name": "cards"|"summary"|"full" }
  const VIEW_PREF = {};
  // { "stepId::name": Array | null }
  const CARDS_CACHE = {};
  // { "stepId::name": string | null }
  const SUMMARY_CACHE = {};
  // { "stepId::name": string | null }
  const FULL_CACHE = {};

  // ── Helpers ──────────────────────────────────────────────────────────
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function sn(s) { return String(s).replace(/[^a-z0-9]/gi,'_'); }
  function fmtTime(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  }
  function md(text) {
    if (!text) return '';
    let s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    s = s.replace(/```[\w]*\n([\s\S]*?)```/g, (_,c) => `<pre><code>${c.trim()}</code></pre>`);
    s = s.replace(/`([^`]+)`/g,'<code>$1</code>');
    s = s.replace(/^#### (.+)$/gm,'<h4>$1</h4>');
    s = s.replace(/^### (.+)$/gm,'<h3>$1</h3>');
    s = s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    s = s.replace(/\*(.+?)\*/g,'<em>$1</em>');
    s = s.replace(/^- (.+)$/gm,'<li>$1</li>');
    s = s.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
    s = s.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
    s = s.split(/\n\n+/).map(b => b.startsWith('<') ? b : `<p>${b.replace(/\n/g,'<br>')}</p>`).join('\n');
    return s;
  }
  const ICON = {
    approved:'✓', completed:'✓', skipped:'—',
    pending_review:'⏳', running:'⚙', failed:'✗',
    rejected:'✗', revision_requested:'↩', not_started:'○',
  };

  // ── Boot ─────────────────────────────────────────────────────────────
  function boot() {
    STEP_IDS = Object.keys(STATE.steps);
    if (!SELECTED || !STATE.steps[SELECTED]) {
      const pending = STEP_IDS.find(id => STATE.steps[id]?.status === 'pending_review');
      const running  = STEP_IDS.find(id => STATE.steps[id]?.status === 'running');
      SELECTED = pending || running || STATE.current_step || STEP_IDS[0];
    }
    renderHeader();
    renderPipeline();
    renderDetail();
    kickLoad();
  }

  function kickLoad() {
    if (!SELECTED || !STATE.steps[SELECTED]) return;
    Object.entries(STATE.steps[SELECTED].artifacts || {}).forEach(([name, info]) => {
      const key = `${SELECTED}::${name}`;
      const def = VIEW_PREF[key] || (info.has_cards ? 'cards' : info.has_summary ? 'summary' : 'full');
      if (def === 'cards'   && info.has_cards)   loadCardsInto(SELECTED, name);
      else if (def === 'summary' && info.has_summary) loadSummaryInto(SELECTED, name);
      else loadFullInto(SELECTED, name);
    });
  }

  // ── Header ───────────────────────────────────────────────────────────
  function renderHeader() {
    document.getElementById('wf-name').textContent = STATE.workflow || 'Workflow';
    document.getElementById('wf-run-id').textContent = STATE.run_id || '';
    const chip = document.getElementById('wf-chip');
    if (STATE.status === 'completed') {
      chip.textContent = 'COMPLETE'; chip.className = 'chip chip-done'; chip.style.display = '';
    } else {
      chip.textContent = 'IN PROGRESS'; chip.className = 'chip chip-active'; chip.style.display = '';
    }
  }

  // ── Pipeline ─────────────────────────────────────────────────────────
  function renderPipeline() {
    document.getElementById('pipeline').innerHTML = STEP_IDS.map((id, i) => {
      const step = STATE.steps[id] || {};
      const st = step.status || 'not_started';
      const cls = ['ps', id === SELECTED ? 'active' : '', st === 'pending_review' ? 'needs-review' : ''].filter(Boolean).join(' ');
      const label = (step.name || id).substring(0, 20);
      const arr = i < STEP_IDS.length - 1 ? '<div class="p-arr"></div>' : '';
      return `<div class="${cls}" onclick="selectStep('${id.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
        <div class="ps-ic ic-${st}">${ICON[st] || '○'}</div>
        <div class="ps-name" title="${esc(step.name||id)}">${esc(label)}</div>
      </div>${arr}`;
    }).join('');
  }

  function selectStep(id) {
    SELECTED = id;
    renderPipeline();
    renderDetail();
    kickLoad();
  }

  // ── Detail ───────────────────────────────────────────────────────────
  function renderDetail() {
    const el = document.getElementById('detail');
    if (!SELECTED || !STATE.steps[SELECTED]) {
      el.innerHTML = '<div class="empty">Select a step to view details.</div>';
      return;
    }
    const id = SELECTED;
    const step = STATE.steps[id];
    const st = step.status || 'not_started';
    const isPending = st === 'pending_review';
    let html = '';

    // Header
    const timing = step.completed_at ? `Completed ${fmtTime(step.completed_at)}`
                 : step.started_at   ? `Started ${fmtTime(step.started_at)}` : '';
    html += `<div class="sdh">
      <div class="sdh-main">
        <div class="sdh-name">${esc(step.name || id)}</div>
        <div class="sdh-meta">${esc(id)}${timing ? ' · ' + timing : ''}</div>
      </div>
      <span class="sbadge sb-${st}">${st.replace(/_/g,' ')}</span>
    </div>`;

    // Artifacts
    const arts = Object.entries(step.artifacts || {});
    if (arts.length > 0) {
      arts.forEach(([name, info]) => { html += buildArtifactBlock(id, name, info); });
    } else if (st === 'not_started') {
      html += '<div class="empty">This step hasn\'t started yet.</div>';
    }

    // Previous review decision
    if (step.review?.decision && !isPending) {
      const dec = step.review.decision.replace(/_/g,' ');
      html += `<div class="rv-hist">
        <strong>Reviewed: ${esc(dec)}</strong>
        ${step.review.comments ? ` — ${esc(step.review.comments)}` : ''}
        ${step.review.decided_at ? ` <span style="color:#9ca3af">(${fmtTime(step.review.decided_at)})</span>` : ''}
      </div>`;
    }

    // Review history (previous iterations)
    if (isPending) html += buildReviewHistory(step);

    // Pending review notice
    if (isPending) {
      html += `<div class="pending-notice">
        <span class="pn-icon">⏳</span>
        <div class="pn-body">
          <div class="pn-title">Awaiting your review</div>
          <div class="pn-desc">A feedback UI has been opened in your browser. Complete your review there to continue the workflow.</div>
        </div>
      </div>`;
    }

    el.innerHTML = html;
  }

  // ── Artifact block ───────────────────────────────────────────────────
  function buildArtifactBlock(stepId, name, info) {
    const key = `${stepId}::${name}`;
    const hasCards   = info.has_cards   || false;
    const hasSummary = info.has_summary || false;
    const def = VIEW_PREF[key] || (hasCards ? 'cards' : hasSummary ? 'summary' : 'full');
    const sfx = `${sn(stepId)}-${sn(name)}`;

    const tabs = [];
    if (hasCards)   tabs.push({k:'cards',   label:'Cards'});
    if (hasSummary) tabs.push({k:'summary', label:'Summary'});
    tabs.push({k:'full', label:'Full'});

    const tabHtml = tabs.map(t =>
      `<button class="abt${def===t.k?' on':''}" onclick="showView('${esc(stepId)}','${esc(name)}','${t.k}')">${t.label}</button>`
    ).join('');

    function panelContent(view) {
      if (view === 'cards') {
        const c = CARDS_CACHE[key];
        return c ? buildCardsGrid(c) : '<em style="color:#9ca3af;font-size:.875rem">Loading cards…</em>';
      }
      if (view === 'summary') {
        const s = SUMMARY_CACHE[key];
        return s !== undefined
          ? (s ? `<div class="sum-view">${md(s)}</div>` : '<em style="color:#9ca3af">Summary unavailable.</em>')
          : '<em style="color:#9ca3af;font-size:.875rem">Loading summary…</em>';
      }
      const f = FULL_CACHE[key];
      return f !== undefined
        ? (f ? `<div class="full-view">${esc(f)}</div>` : '<em style="color:#9ca3af">Failed to load.</em>')
        : '<em style="color:#9ca3af;font-size:.875rem">Loading…</em>';
    }

    const panels = ['cards','summary','full'].map(v =>
      `<div id="vp-${v}-${sfx}" style="display:${def===v?'block':'none'}">${panelContent(v)}</div>`
    ).join('');

    return `<div class="ab">
      <div class="ab-hdr">
        <div>
          <div class="ab-name">${esc(name)}</div>
          ${info.description ? `<div class="ab-desc">${esc(info.description)}</div>` : ''}
        </div>
        <div class="ab-tabs" id="tabs-${sfx}">${tabHtml}</div>
      </div>
      <div class="ab-body">${panels}</div>
    </div>`;
  }

  function showView(stepId, name, view) {
    const key = `${stepId}::${name}`;
    VIEW_PREF[key] = view;
    const sfx = `${sn(stepId)}-${sn(name)}`;

    ['cards','summary','full'].forEach(v => {
      const p = document.getElementById(`vp-${v}-${sfx}`);
      if (p) p.style.display = v === view ? 'block' : 'none';
    });
    document.getElementById(`tabs-${sfx}`)?.querySelectorAll('.abt').forEach(btn => {
      btn.classList.toggle('on', btn.textContent.toLowerCase() === view);
    });

    const info = STATE.steps[stepId]?.artifacts?.[name] || {};
    if (view === 'cards'   && info.has_cards   && CARDS_CACHE[key]   === undefined) loadCardsInto(stepId, name);
    if (view === 'summary' && info.has_summary && SUMMARY_CACHE[key] === undefined) loadSummaryInto(stepId, name);
    if (view === 'full'    && FULL_CACHE[key]  === undefined) loadFullInto(stepId, name);
  }

  // ── Data loaders ─────────────────────────────────────────────────────
  async function loadSummaryInto(stepId, name) {
    const key = `${stepId}::${name}`;
    if (SUMMARY_CACHE[key] !== undefined) return;
    try {
      const r = await fetch(`/api/summary/${name}`);
      SUMMARY_CACHE[key] = r.ok ? await r.text() : null;
    } catch { SUMMARY_CACHE[key] = null; }
    const el = document.getElementById(`vp-summary-${sn(stepId)}-${sn(name)}`);
    if (el && el.style.display !== 'none') {
      el.innerHTML = SUMMARY_CACHE[key]
        ? `<div class="sum-view">${md(SUMMARY_CACHE[key])}</div>`
        : '<em style="color:#9ca3af">Summary unavailable.</em>';
    }
  }

  async function loadCardsInto(stepId, name) {
    const key = `${stepId}::${name}`;
    if (CARDS_CACHE[key] !== undefined) return;
    try {
      const r = await fetch(`/api/artifact/${name}.cards.json`);
      if (r.ok) {
        const parsed = JSON.parse(await r.text());
        CARDS_CACHE[key] = Array.isArray(parsed) && parsed.length ? parsed : null;
      } else {
        CARDS_CACHE[key] = null;
      }
    } catch { CARDS_CACHE[key] = null; }
    const el = document.getElementById(`vp-cards-${sn(stepId)}-${sn(name)}`);
    if (el && el.style.display !== 'none') {
      if (CARDS_CACHE[key]) {
        el.innerHTML = buildCardsGrid(CARDS_CACHE[key]);
      } else {
        showView(stepId, name, 'summary');
        loadSummaryInto(stepId, name);
      }
    }
  }

  async function loadFullInto(stepId, name) {
    const key = `${stepId}::${name}`;
    if (FULL_CACHE[key] !== undefined) return;
    try {
      const r = await fetch(`/api/artifact/${name}`);
      FULL_CACHE[key] = r.ok ? await r.text() : null;
    } catch { FULL_CACHE[key] = null; }
    const el = document.getElementById(`vp-full-${sn(stepId)}-${sn(name)}`);
    if (el && el.style.display !== 'none') {
      el.innerHTML = FULL_CACHE[key]
        ? `<div class="full-view">${esc(FULL_CACHE[key])}</div>`
        : '<em style="color:#9ca3af">Failed to load artifact.</em>';
    }
  }

  // ── Cards grid (read-only) ────────────────────────────────────────────
  function buildCardsGrid(cards) {
    if (!cards?.length) return '<em style="color:#9ca3af">No cards.</em>';
    const items = cards.map(card => {
      const typeCls = `ct-${(card.type||'finding').toLowerCase().replace(/[^a-z]/g,'-')}`;
      const sevCls  = `sev-${(card.severity||'info').toLowerCase()}`;
      return `<div class="card">
        <div class="c-hdr">
          <span class="c-type ${typeCls}">${esc(card.type||'finding')}</span>
          <span class="c-sev ${sevCls}"></span>
          <span class="c-sev-label">${esc(card.severity||'info')}</span>
        </div>
        <div class="c-body">
          <div class="c-title">${esc(card.title||'')}</div>
          <div class="c-abstract">${esc(card.abstract||'')}</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="cards-grid">${items}</div>`;
  }

  // ── Review history ─────────────────────────────────────────────────────
  function buildReviewHistory(step) {
    const hist = step.review_history;
    if (!hist?.length) return '';
    const entries = hist.map((h, i) => {
      const iterNum = h.iteration || (i + 1);
      const dec = h.decision || '';
      const decLabel = dec.replace(/_/g, ' ');
      const entryCls = dec === 'revision_requested' ? 'hr-revision' : dec === 'rejected' ? 'hr-rejected' : '';
      const comments = (h.comments || '').trim();
      return `<div class="hr-entry ${entryCls}">
        <div class="hr-hdr">
          <span class="hr-iter">Round ${iterNum}</span>
          <span class="hr-dec hrd-${dec}">${esc(decLabel)}</span>
          ${h.decided_at ? `<span class="hr-time">${fmtTime(h.decided_at)}</span>` : ''}
        </div>
        ${comments ? `<div class="hr-text">${esc(comments)}</div>` : ''}
      </div>`;
    }).join('');
    return `<div class="hr-section"><div class="hr-title">Previous feedback</div>${entries}</div>`;
  }

  // ── Polling (every 3s) ───────────────────────────────────────────────
  setInterval(async () => {
    try {
      const r = await fetch('/api/state');
      if (!r.ok) return;
      const fresh = await r.json();
      if (JSON.stringify(fresh) !== JSON.stringify(STATE)) {
        Object.keys(fresh.steps || {}).forEach(id => {
          // Step cycling back to running means principal is re-executing — invalidate caches
          if (fresh.steps[id].status === 'running' && STATE.steps[id]?.status !== 'running') {
            Object.keys(STATE.steps[id]?.artifacts || {}).forEach(name => {
              const key = `${id}::${name}`;
              delete CARDS_CACHE[key];
              delete SUMMARY_CACHE[key];
              delete FULL_CACHE[key];
            });
          }
        });
        const prevSelected = SELECTED;
        STATE = fresh;
        STEP_IDS = Object.keys(STATE.steps);
        SELECTED = prevSelected;
        boot();
        showToast('Workflow updated.', 'info');
      }
    } catch { /* server may be down */ }
  }, 3000);

  // ── Utilities ────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type='info') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast toast-${type} on`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('on'), 4500);
  }

  boot();
</script>
</body>
</html>
